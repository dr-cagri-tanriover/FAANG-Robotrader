name: Daily Robotrader Execution
on:
  schedule:
    # 22:00 UTC is 5:00 PM EST (1 hour after US Market Close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Trading Logic
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # uv run automatically handles the virtual env for your script
          uv run trading_logic.py

      - name: Commit and Push Trade Data
        run: |
          git config --global user.name "Robotrader-Bot"
          git config --global user.email "actions@github.com"
          git add data/*.csv
          git commit -m "Daily trade update: $(date -u +'%Y-%m-%d, %T (UTC)')" || exit 0
          git pull --rebase origin main || git rebase --abort
          git push origin main

      - name: Trigger HF Sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run sync_to_hf.yml --ref main